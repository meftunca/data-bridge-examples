# ============================================================
# DataBridge V2 — Innovation Hub Demo Configuration
# ============================================================
# This config.yaml is read by the DataBridge V2 code generator
# to automatically produce the entire API layer.
#
# All features are enabled:
#   - Event Manager Integration (event-driven architecture)
#   - Test Generation (unit + API tests)
#   - RBAC (role-based access control)
#   - SSE (real-time server-sent events)
#   - Outbox Pattern (reliable event delivery)
# ============================================================

# ─── Global Defaults ────────────────────────────────────────
defaultHelperLibBasePath: "github.com/maple-tech/baseline"
defaultPaginationPackagePath: "backend-generator/apiv2/pagination"
defaultImportRepo: "github.com/maple-tech/innovation-hub"
defaultEventManagerIntegration: true
defaultGenerateTests: true
defaultRBACEnabled: false
defaultSSEEnabled: true
defaultSSEPackagePath: "backend-generator/apiv2/sse"
defaultOutboxEnabled: true

# ─── Projects ───────────────────────────────────────────────
projects:
  - name: "innovation-hub"
    outputFolder: "api_v2"
    projectPath: "github.com/maple-tech/backend-generator/apiv2/data-bridge-examples"
    moduleName: "data-bridge-examples"
    importRepo: "data-bridge-examples/api_v2"
    helperLibBasePath: "github.com/maple-tech/baseline"
    paginationPackagePath: "backend-generator/apiv2/pagination"

    # Per-project feature flags (all enabled)
    generateTests: true
    rbacEnabled: false
    sseEnabled: true
    ssePackagePath: "backend-generator/apiv2/sse"
    outboxEnabled: true
    eventManagerIntegration: true

    # ─── Schema Configurations ──────────────────────────────
    schemas:
      # IAM — Identity & Access Management
      - name: "iam"
        skipSchemaPrefixInOps: true
        ignoreTables: []
        relaxGrouping: false
        eventHandlers:
          generate: true
          outputDir: "pkg/iam_events"
          packageName: "iam_handlers"

      # Catalog — Product Catalog & Content Management
      - name: "catalog"
        skipSchemaPrefixInOps: true
        ignoreTables: []
        relaxGrouping: false
        eventHandlers:
          generate: true
          outputDir: "pkg/catalog_events"
          packageName: "catalog_handlers"

      # Orders — Order Processing & Payments
      - name: "orders"
        skipSchemaPrefixInOps: true
        ignoreTables: []
        relaxGrouping: false
        eventHandlers:
          generate: true
          outputDir: "pkg/orders_events"
          packageName: "orders_handlers"

      # Logistics — Warehouse, Inventory & Shipping
      - name: "logistics"
        skipSchemaPrefixInOps: false    # keep schema prefix (demo: show effect of this option)
        ignoreTables: []
        relaxGrouping: true             # flat route structure (demo: show grouping difference)
        eventHandlers:
          generate: true
          outputDir: "pkg/logistics_events"
          packageName: "logistics_handlers"

      # Analytics — Audit, Reporting & Real-time Events
      - name: "analytics"
        skipSchemaPrefixInOps: true
        ignoreTables: []
        relaxGrouping: false
        eventHandlers:
          generate: true
          outputDir: "pkg/analytics_events"
          packageName: "analytics_handlers"
