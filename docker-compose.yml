version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: databridge-demo-db
    environment:
      POSTGRES_USER: databridge
      POSTGRES_PASSWORD: databridge_demo_2026
      POSTGRES_DB: innovation_hub
    ports:
      - "55433:5432"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U databridge -d innovation_hub"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Optional: pgAdmin for visual DB exploration
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: databridge-demo-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@maple.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  pgdata:
