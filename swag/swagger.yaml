          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Fiber200Response'
            - properties:
                message:
                  type: string
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.Fiber400Response'
        "500":
          description: Internal Server Error
          schema:
