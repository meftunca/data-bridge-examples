  contact: {}
paths:
  /alert-history:
    get:
      description: Searches and filters AlertHistory resources without pagination.
        Returns a simple array of results.
      operationId: AnalyticsAlertHistorySearch
      parameters:
      - default: '{{sessionToken}}'
        description: Authentication token
        example: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        in: header
        name: authorization
        required: true
        type: string
      - default: '{{companyID}}'
        description: Company ID
        example: comp_123456789
        in: header
        name: x-company
        required: true
        type: string
      - default: 100
        description: Maximum number of results (1-1000)
        example: 50
        in: query
        name: size
        type: integer
      - description: 'Sort fields with direction: field1,-field2 (- for DESC)'
        example: -created_at,name
        in: query
        name: sort
        type: string
      - description: 'JSON array: [[\'
        example: '[["name","like","%test%"],["status","=","active"]]'
        in: query
        name: filters
        type: string
      - description: Comma-separated relation names to include
        example: user,category,tags
        in: query
        name: preloads
        type: string
      responses:
        "200":
          description: List of AlertHistory resources
          schema:
            items:
              $ref: '#/definitions/analytics_api_structure.AlertHistory'
            type: array
        "400":
          description: Invalid request parameters
          schema:
            $ref: '#/definitions/web.Fiber400Response'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/web.Fiber400Response'
        "403":
          description: Access denied
          schema:
            $ref: '#/definitions/web.Fiber400Response'
        "408":
          description: Request timeout
          schema:
            $ref: '#/definitions/web.Fiber400Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/web.Fiber400Response'
      summary: Search AlertHistory
      tags:
      - AlertHistory
    post:
      description: Adds a new AlertHistory to the database. Auto-generated fields
        like ID, created_at will be populated automatically.
      operationId: AnalyticsAlertHistoryCreate
      parameters:
      - default: '{{sessionToken}}'
        description: Authentication token
        example: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        in: header
        name: authorization
        required: true
        type: string
      - default: '{{companyID}}'
        description: Company ID
        example: comp_123456789
        in: header
        name: x-company
        required: true
        type: string
      - description: The AlertHistory data to create (exclude auto-generated fields)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/analytics_api_structure.AlertHistoryForm'
      responses:
        "201":
          description: AlertHistory created successfully
          schema:
            $ref: '#/definitions/analytics_api_structure.AlertHistoryForm'
        "400":
          description: Invalid input data or validation error
          schema:
            $ref: '#/definitions/web.Fiber400Response'
        "401":
          description: Authentication required
          schema:
            $ref: '#/definitions/web.Fiber400Response'
        "403":
          description: Access denied
          schema:
            $ref: '#/definitions/web.Fiber400Response'
        "408":
          description: Request timeout
          schema:
            $ref: '#/definitions/web.Fiber400Response'
        "409":
          description: AlertHistory already exists (duplicate key)
          schema:
            $ref: '#/definitions/web.Fiber400Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/web.Fiber400Response'
      summary: Create a new AlertHistory
      tags:
      - AlertHistory
  /alert-history/bulk:
    delete:
      description: Deletes multiple AlertHistory resources based on a list of their
        identifiers.
      operationId: AnalyticsAlertHistoryDeleteMultiple
      parameters:
      - default: '{{sessionToken}}'
        description: Authentication token
        in: header
        name: authorization
        required: true
        type: string
      - default: '{{companyID}}'
        description: Company ID
        in: header
        name: x-company
        required: true
        type: string
      - description: A list of AlertHistory identifiers to delete
        in: body
        name: request
        required: true
        schema:
          items:
            $ref: '#/definitions/analytics_api_structure.AlertHistoryIdentity'
          type: array
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/web.Fiber200Response'
            - properties:
                message:
                  type: string
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.Fiber400Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/web.Fiber400Response'
      summary: Delete multiple AlertHistory
      tags:
      - AlertHistory
    post:
      description: Adds multiple AlertHistory to the database in a single request.
      operationId: AnalyticsAlertHistoryCreateMultiple
      parameters:
      - default: '{{sessionToken}}'
        description: Authentication token
        in: header
        name: authorization
        required: true
        type: string
      - default: '{{companyID}}'
        description: Company ID
        in: header
        name: x-company
        required: true
        type: string
      - description: A list of AlertHistory to create
        in: body
        name: request
        required: true
        schema:
